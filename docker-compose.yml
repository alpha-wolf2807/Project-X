version: '3.9'

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PROJECT-X — Docker Compose (Local Development)
# Run: docker-compose up -d
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

services:
  # ── Backend ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projectx-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/projectx
      REDIS_URL: redis://redis:6379
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - projectx-network

  # ── Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projectx-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: import.meta.env.VITE_API_URL/api/v1
      VITE_SOCKET_URL: import.meta.env.VITE_API_URL
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - projectx-network

  # ── MongoDB ───────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: projectx-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - projectx-network

  # ── Redis ─────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: projectx-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - projectx-network

  # ── Mongo Express (DB GUI for dev) ────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: projectx-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: projectx123
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - projectx-network
    profiles:
      - dev-tools

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

networks:
  projectx-network:
    driver: bridge
